<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>thomassccr</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #4a9eff;
    --gold-light: #89c4ff;
    --white: #ffffff;
    --glass-bg: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.15);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
  }

  /* Video background */
  #bg-video {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    min-width: 100%; min-height: 100%;
    width: auto; height: auto;
    z-index: 0;
    object-fit: cover;
    filter: brightness(0.45) saturate(0.8);
  }

  /* Fallback gradient if no video */
  #bg-fallback {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg, #020408 0%, #0a0d14 40%, #050c1a 100%);
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.5) 100%);
  }

  /* Main layout */
  .page {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 380px;
    background: rgba(10, 10, 14, 0.55);
    backdrop-filter: blur(28px) saturate(1.4);
    -webkit-backdrop-filter: blur(28px) saturate(1.4);
    border-radius: 28px;
    border: 1px solid rgba(74, 158, 255, 0.2);
    padding: 32px 28px 28px;
    box-shadow: 0 8px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(20px) scale(0.97);
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Profile header */
  .profile {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a6fd4, #4a9eff, #1a6fd4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #ffffff;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(74,158,255,0.3), 0 4px 20px rgba(74,158,255,0.2);
    position: relative;
    overflow: hidden;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .avatar::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #1a6fd4, #4a9eff, #1a6fd4, transparent, transparent);
    z-index: -1;
    animation: spin 4s linear infinite;
    opacity: 0.6;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .profile-info { flex: 1; }

  .pseudo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.3px;
    line-height: 1;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .badge {
    background: linear-gradient(135deg, #1a6fd4, #4a9eff);
    color: #ffffff;
    font-size: 9px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    padding: 2px 7px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tagline {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.2px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(74,158,255,0.3), transparent);
    margin-bottom: 20px;
  }

  /* Links */
  .links { display: flex; flex-direction: column; gap: 10px; }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    text-decoration: none;
    color: white;
    transition: all 0.25s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(74,158,255,0.08), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .link-btn:hover {
    border-color: rgba(74,158,255,0.35);
    background: rgba(74,158,255,0.07);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .link-btn:hover::before { opacity: 1; }
  .link-btn:active { transform: translateY(0) scale(0.98); }

  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn-icon svg { width: 20px; height: 20px; }

  .discord-ic { background: rgba(88, 101, 242, 0.2); border: 1px solid rgba(88,101,242,0.35); }
  .insta-ic { background: rgba(225, 48, 108, 0.15); border: 1px solid rgba(225,48,108,0.3); }
  .tiktok-ic { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }

  .btn-text { flex: 1; }
  .btn-label { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: #fff; display: block; }
  .btn-sub { font-size: 11px; color: rgba(255,255,255,0.4); }

  .btn-arrow {
    color: rgba(255,255,255,0.25);
    font-size: 16px;
    transition: transform 0.2s, color 0.2s;
  }
  .link-btn:hover .btn-arrow { transform: translateX(3px); color: var(--gold); }

  /* Footer */
  .footer {
    margin-top: 22px;
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.5px;
  }

  /* Mute btn */
  #mute-btn {
    position: fixed;
    top: 16px; left: 16px;
    z-index: 10;
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #mute-btn:hover { background: rgba(255,255,255,0.1); }
  #mute-btn svg { width: 16px; height: 16px; }

  /* Particles / sparkles */
  .sparkle {
    position: fixed;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: var(--gold-light);
    pointer-events: none;
    z-index: 1;
    animation: float linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-120vh) translateX(30px); opacity: 0; }
  }

  @media (max-width: 420px) {
    .card { padding: 24px 20px 22px; }
  }
</style>
<script>
(function() {
  const full = '@thomassccr';
  let removing = true;
  let current = full.length;
  function updateTitle() {
    document.title = full.slice(0, current);
    if (removing) {
      current--;
      if (current <= 1) { removing = false; setTimeout(updateTitle, 600); return; }
      setTimeout(updateTitle, 180);
    } else {
      current++;
      if (current > full.length) { removing = true; setTimeout(updateTitle, 600); return; }
      setTimeout(updateTitle, 220);
    }
  }
  updateTitle();
})();
</script>

<script>
  // Mute toggle
  const video = document.getElementById('bg-video');
  function toggleMute() {
    video.muted = !video.muted;
    document.getElementById('icon-muted').style.display = video.muted ? 'block' : 'none';
    document.getElementById('icon-sound').style.display = video.muted ? 'none' : 'block';
  }

  // Hide video if no source
  video.addEventListener('error', () => { video.style.display = 'none'; });
  if (!video.querySelector('source').src) video.style.display = 'none';

  // Sparkles
  function createSparkle() {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.bottom = '-5px';
    s.style.animationDuration = (6 + Math.random() * 8) + 's';
    s.style.animationDelay = (Math.random() * 4) + 's';
    s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 14000);
  }
  setInterval(createSparkle, 400);

  // Rotating tagline
  const phrases = [
    'Trader since 1 year and a half',
    'Funded trader'
  ];
  let phraseIndex = 0;
  const taglineEl = document.getElementById('rotating-text');

  function rotatePhrases() {
    taglineEl.style.opacity = '0';
    taglineEl.style.transform = 'translateY(6px)';
    setTimeout(() => {
      phraseIndex = (phraseIndex + 1) % phrases.length;
      taglineEl.textContent = phrases[phraseIndex];
      taglineEl.style.opacity = '1';
      taglineEl.style.transform = 'translateY(0)';
    }, 400);
  }

  // Add transition style
  taglineEl.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
  setInterval(rotatePhrases, 2800);
</script>
